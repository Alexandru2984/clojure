# Rate limiting zone for Clojure EventPulse ingestion/listing API.
limit_req_zone $binary_remote_addr zone=clojure_eventpulse_api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=clojure_eventpulse_login:10m rate=5r/m;
limit_conn_zone $binary_remote_addr zone=clojure_eventpulse_sse_conn:10m;
